name: AriaMobile

options:
  bundleIdPrefix: dev.aria
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Set DEVELOPMENT_TEAM below (or via local .xcconfig) before building on a device.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  AriaKit:
    path: AriaKit
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  AriaMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AriaMobile
        excludes:
          - "**/*.md"
    info:
      path: AriaMobile/Resources/Info.plist
      properties:
        CFBundleDisplayName: Aria
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: "Aria connects to your ARIA API over your local/Tailscale network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - package: AriaKit
      - package: SwiftTerm
    entitlements:
      path: AriaMobile/Resources/AriaMobile.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.aria.AriaMobile
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
