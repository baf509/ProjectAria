services:
  # =============================================================================
  # ARIA API Service
  # =============================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aria-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGODB_URI=mongodb://mongod:27017/?directConnection=true&replicaSet=rs0
      - MONGODB_DATABASE=aria
      - LLAMACPP_URL=${LLAMACPP_URL:-http://llamacpp:8080/v1}
      - LLAMACPP_API_KEY=${LLAMACPP_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - EMBEDDING_URL=${EMBEDDING_URL:-http://embeddings:8001/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-voyageai/voyage-4-nano}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - TTS_URL=${TTS_URL:-http://tts:8002/v1}
      - STT_URL=${STT_URL:-http://stt:8003/v1}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - DEBUG=${DEBUG:-false}
    volumes:
      - aria-data:/app/data
    networks:
      - shared-infra

  # =============================================================================
  # Text-to-Speech Service (Qwen3-TTS, CPU)
  # =============================================================================
  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: aria-tts
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - shared-infra

  # =============================================================================
  # Speech-to-Text Service (whisper-large-v3-turbo via faster-whisper, CPU)
  # =============================================================================
  stt:
    build:
      context: ./stt
      dockerfile: Dockerfile
    container_name: aria-stt
    restart: unless-stopped
    ports:
      - "8003:8003"
    networks:
      - shared-infra

  # =============================================================================
  # ARIA Web UI
  # =============================================================================
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: aria-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    networks:
      - shared-infra

volumes:
  aria-data:

networks:
  shared-infra:
    external: true
