services:
  # =============================================================================
  # NOTE: The ARIA API runs natively on the host (not in Docker) so it can
  # access the filesystem, spawn sub-agents, and run shell commands.
  # Start it via: systemctl --user start aria-api
  # =============================================================================

  # =============================================================================
  # Text-to-Speech Service (Qwen3-TTS, CPU)
  # =============================================================================
  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: aria-tts
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - shared-infra

  # =============================================================================
  # Speech-to-Text Service (whisper-large-v3-turbo via faster-whisper, CPU)
  # =============================================================================
  stt:
    build:
      context: ./stt
      dockerfile: Dockerfile
    container_name: aria-stt
    restart: unless-stopped
    ports:
      - "8003:8003"
    networks:
      - shared-infra

  # =============================================================================
  # ARIA Web UI
  # =============================================================================
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-aria-local-admin-key}
    container_name: aria-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY:-aria-local-admin-key}
    networks:
      - shared-infra

networks:
  shared-infra:
    external: true
