<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <span class="title">ARIA</span>
      <div class="mode-picker-wrap">
        <label for="mode-picker" class="sr-only">Mode</label>
        <select id="mode-picker" title="Switch mode">
          <option value="">Mode</option>
        </select>
      </div>
      <div class="titlebar-actions">
        <button id="btn-quick-actions" title="Quick Actions">&#9889;</button>
        <button id="btn-new-chat" title="New Chat">+</button>
        <button id="btn-settings" title="Settings">&#9881;</button>
      </div>
    </header>

    <div id="quick-actions-panel" class="hidden">
      <button class="quick-action" data-action="coding-status">
        <span class="qa-icon">&#128187;</span>
        <span class="qa-label">Coding status</span>
      </button>
      <button class="quick-action" data-action="memories">
        <span class="qa-icon">&#129504;</span>
        <span class="qa-label">Show memories</span>
      </button>
      <button class="quick-action" data-action="research">
        <span class="qa-icon">&#128270;</span>
        <span class="qa-label">Research...</span>
      </button>
      <button class="quick-action" data-action="new-chat">
        <span class="qa-icon">&#10133;</span>
        <span class="qa-label">New chat</span>
      </button>
      <div class="qa-research-input hidden">
        <input type="text" id="qa-research-query" placeholder="What to research..." />
      </div>
    </div>

    <div id="messages"></div>

    <div id="settings-panel" class="hidden">
      <label>
        API URL
        <input type="text" id="setting-api-url" placeholder="http://localhost:8000" />
      </label>
      <label>
        API Key
        <input type="password" id="setting-api-key" placeholder="Enter API key" />
      </label>
      <label>
        Hotkey
        <input type="text" id="setting-hotkey" placeholder="ctrl+shift+space" readonly />
      </label>
      <button id="btn-save-settings">Save</button>
    </div>

    <form id="input-form">
      <div class="input-row">
        <button type="button" id="btn-mic" title="Voice input">&#127908;</button>
        <textarea id="input" rows="1" placeholder="Ask ARIA anything..." autofocus></textarea>
        <button type="submit" id="btn-send" title="Send">&#9654;</button>
      </div>
    </form>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
