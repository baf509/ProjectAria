# ARIA Watched Shells — tmux hook snippet
#
# Source this from ~/.tmux.conf:
#     source-file /home/ben/Development/ProjectAria/scripts/aria-tmux-hook.conf
#
# Prereqs:
#   - /home/ben/.local/bin/aria-shell-register (symlink to scripts/aria-shell-register)
#   - /home/ben/.local/bin/aria-shell-capture  (symlink to scripts/aria-shell-capture)
#   - MONGODB_URI (and optionally MONGODB_DATABASE) exported to the tmux
#     server environment, or present in /etc/aria/shells.env or ~/.aria-env.

# Don't flash the status line on pane bells. Claude Code emits bells for any
# key it doesn't recognize in modal states, and `bell-action any` made every
# keystroke flash the status bar — confusing users into thinking input wasn't
# reaching the pane.
set-option -g bell-action none

# `run-shell -b` runs in the background. Without -b, the hook synchronously
# blocks the attach handshake AND any output from the script (including stderr
# from child tmux commands) gets shown in a popup that intercepts user input.
# Both effects look like "typing doesn't work" to a fresh-attached user.

# Both session-created and client-attached call --ensure-capture, which is
# idempotent (registers in Mongo and toggles pipe-pane on if not already
# active). Going through the script avoids tmux's hook-context bug where
# `#{session_name}` in the body of an if-shell expansion can resolve to empty
# when the hook fires from a non-client context (e.g., the API creating a
# session detached). The script gets a non-empty name argument because if-shell
# only takes the body branch when the condition matched, and the condition is
# evaluated in client context where the format does expand.
set-hook -g session-created 'if -F "#{m:claude-*,#{session_name}}" "run-shell -b \"/home/ben/.local/bin/aria-shell-register --ensure-capture #{session_name} #{session_path} #{pane_id}\""'

set-hook -g session-closed 'if -F "#{m:claude-*,#{hook_session_name}}" "run-shell -b \"/home/ben/.local/bin/aria-shell-register --closed #{hook_session_name}\""'

set-hook -g client-attached 'if -F "#{m:claude-*,#{session_name}}" "run-shell -b \"/home/ben/.local/bin/aria-shell-register --ensure-capture #{session_name} #{session_path} #{pane_id}\""'
