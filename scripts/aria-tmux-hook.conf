# ARIA Watched Shells — tmux hook snippet
#
# Source this from ~/.tmux.conf:
#     source-file /home/ben/Development/ProjectAria/scripts/aria-tmux-hook.conf
#
# Prereqs:
#   - /home/ben/.local/bin/aria-shell-register (symlink to scripts/aria-shell-register)
#   - /home/ben/.local/bin/aria-shell-capture  (symlink to scripts/aria-shell-capture)
#   - MONGODB_URI (and optionally MONGODB_DATABASE) exported to the tmux
#     server environment, or present in /etc/aria/shells.env or ~/.aria-env.

set-hook -g session-created 'if -F "#{m:claude-*,#{session_name}}" "run-shell \"/home/ben/.local/bin/aria-shell-register #{session_name} #{session_path} #{pane_id}\" ; pipe-pane -o -t #{session_name} \"/home/ben/.local/bin/aria-shell-capture #{session_name}\""'

set-hook -g session-closed 'if -F "#{m:claude-*,#{hook_session_name}}" "run-shell \"/home/ben/.local/bin/aria-shell-register --closed #{hook_session_name}\""'

set-hook -g client-attached 'if -F "#{m:claude-*,#{session_name}}" "run-shell \"/home/ben/.local/bin/aria-shell-register --ensure-capture #{session_name} #{session_path} #{pane_id}\""'
